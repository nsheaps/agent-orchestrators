name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1'
      # NOTE: JS/TS deps resolve through Cloudsmith (bunfig.toml), authenticated
      # via OIDC per org policy — wire up the org's Cloudsmith OIDC step here
      # before this job can actually install.
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      # createWebHistory() needs every deep link to resolve on Pages — serve
      # the app shell for unmatched paths and let vue-router take over client-side.
      - name: SPA deep-link fallback
        run: cp apps/web/dist/index.html apps/web/dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
